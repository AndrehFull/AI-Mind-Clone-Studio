# Local stack: Postgres (pgvector) + FastAPI backend + Next.js frontend.
#
#   1. cp .env.example .env.local   (fill in OPENAI_API_KEY)
#   2. docker compose up --build
#   3. open http://localhost:3000   (API at http://localhost:8000)
#
# The DB is seeded automatically from db/schema.sql and db/seed.sql on first run.
# Embeddings/chat still call the OpenAI API — only the database is local.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mindclone
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # init scripts run in alphabetical order on an empty data dir
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mindclone"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    env_file:
      - .env.local
    environment:
      # Reach the db service inside the compose network (overrides .env.local).
      DATABASE_URL: postgres://postgres:postgres@db:5432/mindclone
      # CORS: "*" lets the browser reach the API from localhost/127.0.0.1/LAN.
      WEB_ORIGIN: "*"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* must be present at build time (baked into the client bundle).
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      # Server-side rendering reaches the API over the compose network.
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
